<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <style>

        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
        }

        nav {
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        main {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            flex: 1;
            background: #eee;
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

    </style>
</head>
<body>

<header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Sobre</a>
        <a href="#">Serviços</a>
        <a href="#">Contato</a>
    </nav>
</header>

<main>
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
</main>

<footer>
    Rodapé
</footer>

</body>    
</html>
